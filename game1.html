<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>偶像歷程回顧之旅</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0d0d1a;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 遊戲畫布容器：固定 16:9 比例，自動縮放以適應手機螢幕不變形 */
    #game-wrapper {
      position: relative;
      width: 100vw;
      height: 56.25vw; /* 16:9 比例 */
      max-height: 100vh;
      max-width: 177.78vh;
      background: #1a1a2e;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* 直向螢幕提示 (優化橫向體驗) */
    @media (orientation: portrait) {
      #game-wrapper::after {
        content: "📱 請將手機旋轉至橫向以獲得最佳體驗";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.2rem;
        z-index: 100;
        text-align: center;
        padding: 20px;
      }
    }

    /* UI Overlay 畫面 */
    .screen-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      z-index: 10;
      text-align: center;
      padding: 20px;
    }

    .hidden {
      display: none !important;
    }

    h1 {
      font-size: 1.6rem;
      color: #ff2a74;
      margin-bottom: 8px;
    }

    p {
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 15px;
      max-width: 480px;
    }

    .btn {
      padding: 10px 25px;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, #ff2a74, #ff758c);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255, 42, 116, 0.4);
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* 手機控制按鈕：精確上抬，確保完整且位於地平線上方 */
    .controls {
      position: absolute;
      bottom: 30px; /* 抬高 30px，確保下半部完整 */
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 30px;
      padding-bottom: env(safe-area-inset-bottom);
      pointer-events: none;
      z-index: 5;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      pointer-events: auto;
    }

    /* Arrow 控制鍵圖片 */
    .arrow-btn {
      width: 50px;
      height: 50px;
      object-fit: contain;
      cursor: pointer;
      filter: drop-shadow(0 2px 5px rgba(0,0,0,0.8));
    }

    /* 左箭頭水平翻轉 */
    #btn-left {
      transform: scaleX(-1);
    }

    #btn-left:active {
      transform: scaleX(-1) scale(0.9);
    }

    #btn-right:active, #btn-jump:active {
      transform: scale(0.9);
    }

    /* 跳躍按鈕 */
    .touch-btn {
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.25);
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 1.4rem;
      font-weight: bold;
      backdrop-filter: blur(4px);
      pointer-events: auto;
      box-shadow: 0 2px 5px rgba(0,0,0,0.8);
    }

    #event-modal {
      background: rgba(20, 20, 35, 0.95);
      border: 2px solid #ff2a74;
      border-radius: 12px;
      width: 80%;
      max-width: 420px;
      padding: 20px;
    }

    #event-title {
      color: #ffd700;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <!-- 小遊戲背景音樂 game.mp3 -->
  <audio id="game-bgm" src="game.mp3" loop></audio>

  <div id="game-wrapper">
    <!-- 固定內部標準解析度為 800x450，防止壓扁 -->
    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <!-- 左右與跳躍按鈕層 -->
    <div class="controls">
      <div class="btn-group">
        <img src="arrow.png" class="arrow-btn" id="btn-left" alt="向左">
        <img src="arrow.png" class="arrow-btn" id="btn-right" alt="向右">
      </div>
      <div class="btn-group">
        <div class="touch-btn" id="btn-jump">▲</div>
      </div>
    </div>

    <!-- 開始畫面 -->
    <div id="start-screen" class="screen-overlay">
      <h1>偶像星光歷程展</h1>
      <p>
        歡迎來到偶像的回顧之旅！<br>
        • 使用畫面左下角箭頭移動<br>
        • 使用右下角 <b>▲</b> 跳躍收集筒筒<br>
        • 沿途觸發大事件重溫歷程！
      </p>
      <button class="btn" id="start-btn">開始旅程</button>
    </div>

    <!-- 事件回顧彈窗 -->
    <div id="event-screen" class="screen-overlay hidden">
      <div id="event-modal">
        <h2 id="event-title">大事件標題</h2>
        <p id="event-desc">大事件詳細內容...</p>
        <button class="btn" id="close-event-btn">繼續前進</button>
      </div>
    </div>

    <!-- 結算畫面 -->
    <div id="end-screen" class="screen-overlay hidden">
      <h1>抵達終點！</h1>
      <p id="final-score">恭喜你完成了偶像歷程巡演！</p>
      <button class="btn" id="restart-btn">再次回顧</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // 固定邏輯標準解析度
    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 450;
    const GROUND_Y = 380; // 地平線位置

    // 載入遊戲圖片資源
    const imgSmall = new Image();
    imgSmall.src = 'small.png';

    const imgBig = new Image();
    imgBig.src = 'big.png';

    const imgRunRight = new Image();
    imgRunRight.src = 'runright.png';

    const imgRunLeft = new Image();
    imgRunLeft.src = 'runleft.png';

    // 音樂與 UI 元素
    const gameBgm = document.getElementById('game-bgm');
    gameBgm.volume = 0.5;

    const startScreen = document.getElementById('start-screen');
    const eventScreen = document.getElementById('event-screen');
    const endScreen = document.getElementById('end-screen');
    const eventTitle = document.getElementById('event-title');
    const eventDesc = document.getElementById('event-desc');
    const finalScore = document.getElementById('final-score');

    // 遊戲狀態與數據
    let gameState = 'START'; // START, PLAYING, PAUSED, END
    let score = 0;
    let cameraX = 0;
    const worldWidth = 3200;

    // 玩家控制參數
    const player = {
      x: 100,
      y: GROUND_Y - 56,
      width: 46,
      height: 56,
      vx: 0,
      vy: 0,
      speed: 4.5,
      jumpPower: -11.5,
      gravity: 0.55,
      isGrounded: false,
      facing: 'right'
    };

    // 收集品 (small.png)
    let collectibles = [
      { x: 300, y: GROUND_Y - 80, size: 36, collected: false },
      { x: 500, y: GROUND_Y - 130, size: 36, collected: false },
      { x: 750, y: GROUND_Y - 80, size: 36, collected: false },
      { x: 1100, y: GROUND_Y - 120, size: 36, collected: false },
      { x: 1400, y: GROUND_Y - 80, size: 36, collected: false },
      { x: 1800, y: GROUND_Y - 140, size: 36, collected: false },
      { x: 2200, y: GROUND_Y - 80, size: 36, collected: false },
      { x: 2600, y: GROUND_Y - 110, size: 36, collected: false }
    ];

    // 大事件展區 (big.png)
    let eventNodes = [
      { x: 600, y: GROUND_Y - 60, size: 55, title: '初次出道展演', desc: '站上舞台的那一天，璀璨星光由此展開！', triggered: false },
      { x: 1300, y: GROUND_Y - 60, size: 55, title: '首張專輯發行', desc: '主打歌曲登上榜首，感謝一路相伴的粉絲們！', triggered: false },
      { x: 2000, y: GROUND_Y - 60, size: 55, title: '世界巡迴演唱會', desc: '萬人場館座無虛席，共同創造震撼的應援紫海！', triggered: false },
      { x: 2800, y: GROUND_Y - 60, size: 55, title: '榮獲年度最佳歌手', desc: '榮耀时刻，站在巔峰繼續攜手前行！', triggered: false }
    ];

    // 按鈕與鍵盤輸入控制
    const keys = { left: false, right: false, jump: false };

    // 播放背景音樂 (解決瀏覽器 Autoplay 限制)
    function playMusic() {
      gameBgm.currentTime = 0;
      gameBgm.play().catch(e => console.log("音樂自動播放阻擋：", e));
    }

    // 事件監聽：鍵盤
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
      if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
      if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') && player.isGrounded) {
        player.vy = player.jumpPower;
        player.isGrounded = false;
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
      if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
    });

    // 事件監聽：觸控按鈕
    const setupTouchBtn = (elementId, keyName) => {
      const el = document.getElementById(elementId);
      el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyName] = true; });
      el.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyName] = false; });
      el.addEventListener('mousedown', () => { keys[keyName] = true; });
      el.addEventListener('mouseup', () => { keys[keyName] = false; });
    };

    setupTouchBtn('btn-left', 'left');
    setupTouchBtn('btn-right', 'right');

    const jumpBtn = document.getElementById('btn-jump');
    const triggerJump = (e) => {
      if (e) e.preventDefault();
      if (player.isGrounded) {
        player.vy = player.jumpPower;
        player.isGrounded = false;
      }
    };
    jumpBtn.addEventListener('touchstart', triggerJump);
    jumpBtn.addEventListener('mousedown', triggerJump);

    // 按鈕 UI 操作
    document.getElementById('start-btn').addEventListener('click', () => {
      startScreen.classList.add('hidden');
      gameState = 'PLAYING';
      playMusic();
    });

    document.getElementById('close-event-btn').addEventListener('click', () => {
      eventScreen.classList.add('hidden');
      gameState = 'PLAYING';
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
      resetGame();
      endScreen.classList.add('hidden');
      gameState = 'PLAYING';
      playMusic();
    });

    function resetGame() {
      score = 0;
      player.x = 100;
      player.y = GROUND_Y - player.height;
      player.vx = 0;
      player.vy = 0;
      cameraX = 0;
      collectibles.forEach(c => c.collected = false);
      eventNodes.forEach(e => e.triggered = false);
    }

    // 遊戲核心邏輯更新
    function update() {
      if (gameState !== 'PLAYING') return;

      // 橫向移動處理
      if (keys.left) {
        player.vx = -player.speed;
        player.facing = 'left';
      } else if (keys.right) {
        player.vx = player.speed;
        player.facing = 'right';
      } else {
        player.vx = 0;
      }

      // 重力與位置更新
      player.vy += player.gravity;
      player.x += player.vx;
      player.y += player.vy;

      // 地平線碰撞判定
      if (player.y + player.height >= GROUND_Y) {
        player.y = GROUND_Y - player.height;
        player.vy = 0;
        player.isGrounded = true;
      }

      // 地圖邊界限制
      if (player.x < 0) player.x = 0;
      if (player.x + player.width > worldWidth) {
        // 抵達終點
        gameState = 'END';
        finalScore.innerText = `恭喜你完成了偶像歷程巡演！最終收集了 ${score} 個筒筒！`;
        endScreen.classList.remove('hidden');
      }

      // 鏡頭跟隨
      cameraX = player.x - CANVAS_WIDTH / 3;
      if (cameraX < 0) cameraX = 0;
      if (cameraX > worldWidth - CANVAS_WIDTH) cameraX = worldWidth - CANVAS_WIDTH;

      // 檢查收集品碰撞
      collectibles.forEach(c => {
        if (!c.collected &&
            player.x < c.x + c.size &&
            player.x + player.width > c.x &&
            player.y < c.y + c.size &&
            player.y + player.height > c.y) {
          c.collected = true;
          score += 1;
        }
      });

      // 檢查大事件觸發
      eventNodes.forEach(e => {
        if (!e.triggered &&
            player.x < e.x + e.size &&
            player.x + player.width > e.x &&
            player.y < e.y + e.size &&
            player.y + player.height > e.y) {
          e.triggered = true;
          gameState = 'PAUSED';
          eventTitle.innerText = e.title;
          eventDesc.innerText = e.desc;
          eventScreen.classList.remove('hidden');
        }
      });
    }

    // 畫面繪製渲染
    function draw() {
      ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.save();
      ctx.translate(-cameraX, 0);

      // 1. 畫背景與地平線
      ctx.strokeStyle = '#ff2a74';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y);
      ctx.lineTo(worldWidth, GROUND_Y);
      ctx.stroke();

      // 2. 畫大事件展區 (big.png)
      eventNodes.forEach(e => {
        if (imgBig.complete && imgBig.naturalWidth !== 0) {
          ctx.drawImage(imgBig, e.x, e.y, e.size, e.size);
        } else {
          ctx.fillStyle = e.triggered ? '#555' : '#ffd700';
          ctx.fillRect(e.x, e.y, e.size, e.size);
        }
      });

      // 3. 畫收集品 (small.png)
      collectibles.forEach(c => {
        if (!c.collected) {
          if (imgSmall.complete && imgSmall.naturalWidth !== 0) {
            ctx.drawImage(imgSmall, c.x, c.y, c.size, c.size);
          } else {
            ctx.fillStyle = '#ff758c';
            ctx.beginPath();
            ctx.arc(c.x + c.size/2, c.y + c.size/2, c.size/2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      });

      // 4. 畫玩家主角
      const curImg = player.facing === 'left' ? imgRunLeft : imgRunRight;
      if (curImg.complete && curImg.naturalWidth !== 0) {
        ctx.drawImage(curImg, player.x, player.y, player.width, player.height);
      } else {
        ctx.fillStyle = '#00f0ff';
        ctx.fillRect(player.x, player.y, player.width, player.height);
      }

      ctx.restore();

      // 5. 畫頂部固定 UI (得分標示)
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 18px Arial';
      ctx.shadowColor = '#000000';
      ctx.shadowBlur = 4;
      ctx.fillText(`收集筒筒數: ${score}`, 20, 35);
      ctx.shadowBlur = 0;
    }

    // 遊戲主迴圈
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // 啟動遊戲迴圈
    gameLoop();
  </script>
</body>
</html>
