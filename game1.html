<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>偶像歷程回顧之旅</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0d0d1a;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 16:9 自適應遊戲容器 */
    #game-wrapper {
      position: relative;
      width: 100vw;
      height: 56.25vw;
      max-height: 100vh;
      max-width: 177.78vh;
      background: #1a1a2e;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* 計分 UI：純文字、淺藍金字體風格 */
    #score-badge {
      position: absolute;
      top: 55px;
      left: 25px;
      z-index: 20;
      color: #87cefa;
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.9), 0 0 10px rgba(135, 206, 250, 0.5);
      pointer-events: none;
    }

    /* 直向提示 */
    @media (orientation: portrait) {
      #game-wrapper::after {
        content: "📱 請將手機旋轉至橫向以獲得最佳體驗";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        font-size: 1.2rem;
        z-index: 100;
        padding: 20px;
        box-sizing: border-box;
      }
    }

    /* UI 彈窗層 */
    .screen-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      z-index: 30;
      text-align: center;
      padding: 20px;
    }

    .hidden {
      display: none !important;
    }

    h1 {
      font-size: 1.6rem;
      color: #ff2a74;
      margin-bottom: 8px;
    }

    p {
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 15px;
      max-width: 480px;
    }

    .btn {
      padding: 10px 25px;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, #00bfff, #87cefa);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0, 191, 255, 0.4);
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* 控制按鈕容器 */
    .controls {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 25px;
      padding-bottom: env(safe-area-inset-bottom);
      pointer-events: none;
      z-index: 10;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      align-items: flex-end;
      pointer-events: auto;
    }

    .arrow-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .arrow-label {
      position: absolute;
      top: 38px;
      font-size: 1.3rem;
      color: #ffffff;
      text-shadow: 0 2px 5px rgba(0,0,0,0.9);
      font-weight: bold;
      pointer-events: none;
      z-index: 2;
    }

    .arrow-btn {
      width: 110px;
      height: 110px;
      object-fit: contain;
      cursor: pointer;
      opacity: 0.6;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.85));
      transition: opacity 0.2s;
    }

    .arrow-btn:active {
      opacity: 0.9;
    }

    #btn-left {
      transform: scaleX(-1);
    }

    #btn-left:active {
      transform: scaleX(-1) scale(0.92);
    }

    #btn-right:active, #btn-jump:active {
      transform: scale(0.92);
    }

    .touch-btn {
      width: 65px;
      height: 65px;
      background: rgba(255, 255, 255, 0.25);
      border: 3px solid rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 1.6rem;
      font-weight: bold;
      backdrop-filter: blur(4px);
      pointer-events: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.85);
      opacity: 0.6;
    }

    .touch-btn:active {
      opacity: 0.9;
    }

    #event-modal {
      background: rgba(20, 20, 35, 0.95);
      border: 2px solid #87cefa;
      border-radius: 12px;
      width: 80%;
      max-width: 420px;
      padding: 20px;
    }

    #event-title {
      color: #87cefa;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <!-- 音樂資源 -->
  <audio id="game-bgm" src="game.mp3" loop preload="auto"></audio>
  <audio id="sound1" src="sound1.mp3" preload="auto"></audio>
  <audio id="sound2" src="sound2.mp3" preload="auto"></audio>

  <div id="game-wrapper">
    <div id="score-badge">收集筒筒數: <span id="total-score">0</span></div>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <!-- UI 控制區 -->
    <div class="controls">
      <div class="btn-group">
        <div class="arrow-container">
          <div class="arrow-label">◄</div>
          <img src="arrow.png" class="arrow-btn" id="btn-left" alt="向左">
        </div>
        <div class="arrow-container">
          <div class="arrow-label">►</div>
          <img src="arrow.png" class="arrow-btn" id="btn-right" alt="向右">
        </div>
      </div>
      <div class="btn-group">
        <div class="touch-btn" id="btn-jump">▲</div>
      </div>
    </div>

    <!-- 開始畫面 -->
    <div id="start-screen" class="screen-overlay">
      <h1>偶像星光歷程展</h1>
      <p>
        歡迎來到偶像的回顧之旅！<br>
        • 使用左下角箭頭移動與爬樓梯<br>
        • 使用右下角 <b>▲</b> 跳躍跨越山谷高台<br>
        • 挑戰凹字弧形谷與高台山谷，累積高分完成巡演！
      </p>
      <button class="btn" id="start-btn">開始旅程</button>
    </div>

    <!-- 事件彈窗 -->
    <div id="event-screen" class="screen-overlay hidden">
      <div id="event-modal">
        <h2 id="event-title">大事件標題</h2>
        <p id="event-desc">大事件詳細內容...</p>
        <button class="btn" id="close-event-btn">繼續前進</button>
      </div>
    </div>

    <!-- 結算畫面 -->
    <div id="end-screen" class="screen-overlay hidden">
      <h1>抵達終點！</h1>
      <p id="final-score">恭喜你完成了偶像歷程巡演！</p>
      <button class="btn" id="restart-btn">再次回顧</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 450;
    const GROUND_Y = Math.round(CANVAS_HEIGHT * 0.65);

    // 音訊安全播放
    const gameBgm = document.getElementById('game-bgm');
    const sfxSound1 = document.getElementById('sound1');
    const sfxSound2 = document.getElementById('sound2');
    gameBgm.volume = 0.5;
    let musicStarted = false;

    function initAudio() {
      if (!musicStarted) {
        gameBgm.play().then(() => {
          musicStarted = true;
        }).catch(() => {});
      }
    }

    function playSound1() {
      try {
        sfxSound1.currentTime = 0;
        sfxSound1.volume = 0.8;
        sfxSound1.play().catch(() => {});
      } catch (e) {}
    }

    function playSound2() {
      try {
        sfxSound2.currentTime = 0;
        sfxSound2.volume = 1.0;
        sfxSound2.play().catch(() => {});
      } catch (e) {}
    }

    window.addEventListener('click', initAudio, { once: true });
    window.addEventListener('touchstart', initAudio, { once: true });

    // 載入圖片
    const images = {};
    function loadImage(key, src) {
      const img = new Image();
      img.src = src;
      img.onload = () => { images[key] = true; };
      img.onerror = () => { images[key] = false; };
      return img;
    }

    const imgSmall = loadImage('small', 'small.png');
    const imgBig = loadImage('big', 'big.png');
    const imgRunRight = loadImage('runRight', 'runright.png');
    const imgRunLeft = loadImage('runLeft', 'runleft.png');

    // UI DOM
    const startScreen = document.getElementById('start-screen');
    const eventScreen = document.getElementById('event-screen');
    const endScreen = document.getElementById('end-screen');
    const eventTitle = document.getElementById('event-title');
    const eventDesc = document.getElementById('event-desc');
    const finalScore = document.getElementById('final-score');
    const totalScoreEl = document.getElementById('total-score');

    let gameState = 'START';
    let totalScore = 0;
    let cameraX = 0;
    let worldWidth = 16000;

    const player = {
      x: 100,
      y: GROUND_Y - 138,
      width: 110,
      height: 138,
      vx: 0,
      vy: 0,
      speed: 6.0,
      jumpPower: -11.5,
      gravity: 0.62,
      isGrounded: false,
      facing: 'right',
      walkTimer: 0
    };

    const SMALL_BASE_WIDTH = 50;
    const BIG_BASE_WIDTH = 95;

    const eventTitles = [
      '初次出道展演', '首張單曲爆紅', '舉辦首次見面會', '首張專輯發行', '綜藝節目大獲好評',
      '跨國音樂節嘉賓', '世界巡迴演唱會', '榮獲年度最佳歌手', '達成百萬銷量紀錄', '十週年紀念演唱會'
    ];
    const eventDescs = [
      '站上舞台的那一天，璀璨星光由此展開！',
      '旋律傳遍街頭巷尾，登上流行榜單第一名！',
      '與現場粉絲溫馨互動，收穫無數感動與淚水！',
      '展現多樣音樂風格，獲評論家與歌迷一致盛讚！',
      '憑藉獨特魅力與幽默感圈粉無數，引爆討論熱潮！',
      '代表登上國際舞台，向世界展示獨一無二的震撼演出！',
      '萬人場館座無虛席，共同創造震撼的應援紫海！',
      '榮耀時刻，站在巔峰繼續攜手前行！',
      '突破歷史性的銷量里程碑，成為殿堂級傳奇！',
      '感謝一路相伴，未來的星光之路依然一同耀眼綻放！'
    ];

    let collectibles = [];
    let eventNodes = [];
    let platforms = [];
    let uValleys = [];

    function generateLevelData() {
      collectibles = [];
      eventNodes = [];
      platforms = [];
      uValleys = [];

      let currentX = 400;
      const stepX = 130;

      const startHeights = [50, 110, 190, 120, 60];
      for (let i = 0; i < 5; i++) {
        collectibles.push({ x: currentX, yOffset: startHeights[i], collected: false });
        currentX += stepX;
      }

      for (let b = 0; b < 10; b++) {
        currentX += 150;
        const layoutType = b % 4;
        let bigYOffset = 0;

        if (layoutType === 0) {
          platforms.push({ x: currentX, y: GROUND_Y - 45, w: 90, h: 45 });
          platforms.push({ x: currentX + 75, y: GROUND_Y - 90, w: 90, h: 90 });
          platforms.push({ x: currentX + 150, y: GROUND_Y - 135, w: 260, h: 135 });

          bigYOffset = 135;
          eventNodes.push({
            x: currentX + 270, yOffset: bigYOffset,
            title: eventTitles[b], desc: eventDescs[b],
            triggered: false, collected: false
          });

          currentX += 450;

        } else if (layoutType === 1) {
          uValleys.push({ x: currentX, w: 360, depth: 70 });

          bigYOffset = 0;
          eventNodes.push({
            x: currentX + 180, yOffset: bigYOffset,
            title: eventTitles[b], desc: eventDescs[b],
            triggered: false, collected: false
          });

          currentX += 400;

        } else if (layoutType === 2) {
          platforms.push({ x: currentX, y: GROUND_Y - 110, w: 160, h: 110 });
          
          bigYOffset = 110;
          eventNodes.push({
            x: currentX + 80, yOffset: bigYOffset,
            title: eventTitles[b], desc: eventDescs[b],
            triggered: false, collected: false
          });

          platforms.push({ x: currentX + 260, y: GROUND_Y - 50, w: 70, h: 50 });
          platforms.push({ x: currentX + 370, y: GROUND_Y - 110, w: 180, h: 110 });

          currentX += 580;

        } else {
          platforms.push({ x: currentX, y: GROUND_Y - 50, w: 80, h: 50 });
          platforms.push({ x: currentX + 65, y: GROUND_Y - 100, w: 180, h: 100 });
          platforms.push({ x: currentX + 230, y: GROUND_Y - 50, w: 80, h: 50 });

          bigYOffset = 100;
          eventNodes.push({
            x: currentX + 150, yOffset: bigYOffset,
            title: eventTitles[b], desc: eventDescs[b],
            triggered: false, collected: false
          });

          currentX += 380;
        }

        if (b < 9) {
          for (let s = 0; s < 10; s++) {
            let yOff = 50;
            const hPattern = (s + b) % 5;
            if (hPattern === 1) yOff = 130;
            if (hPattern === 2) yOff = 220; 
            if (hPattern === 3) yOff = 170;
            if (hPattern === 4) yOff = 80;

            collectibles.push({ x: currentX, yOffset: yOff, collected: false });
            currentX += stepX;
          }
        }
      }

      currentX += 100;
      const endHeights = [50, 130, 210, 140, 50];
      for (let i = 0; i < 5; i++) {
        collectibles.push({ x: currentX, yOffset: endHeights[i], collected: false });
        currentX += stepX;
      }

      worldWidth = currentX + 800;
    }

    const keys = { left: false, right: false, jump: false };

    window.addEventListener('keydown', (e) => {
      initAudio();
      if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
      if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
      if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') && player.isGrounded && gameState === 'PLAYING') {
        player.vy = player.jumpPower;
        player.isGrounded = false;
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
      if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
    });

    const setupTouchBtn = (elementId, keyName) => {
      const el = document.getElementById(elementId);
      if (!el) return;
      const start = (e) => { e.preventDefault(); initAudio(); keys[keyName] = true; };
      const end = (e) => { e.preventDefault(); keys[keyName] = false; };
      el.addEventListener('touchstart', start);
      el.addEventListener('touchend', end);
      el.addEventListener('mousedown', start);
      el.addEventListener('mouseup', end);
    };

    setupTouchBtn('btn-left', 'left');
    setupTouchBtn('btn-right', 'right');

    const jumpBtn = document.getElementById('btn-jump');
    if (jumpBtn) {
      const triggerJump = (e) => {
        if (e) e.preventDefault();
        initAudio();
        if (player.isGrounded && gameState === 'PLAYING') {
          player.vy = player.jumpPower;
          player.isGrounded = false;
        }
      };
      jumpBtn.addEventListener('touchstart', triggerJump);
      jumpBtn.addEventListener('mousedown', triggerJump);
    }

    document.getElementById('start-btn').addEventListener('click', () => {
      initAudio();
      startScreen.classList.add('hidden');
      resetGame();
      gameState = 'PLAYING';
    });

    document.getElementById('close-event-btn').addEventListener('click', () => {
      eventScreen.classList.add('hidden');
      gameState = 'PLAYING';
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
      resetGame();
      endScreen.classList.add('hidden');
      gameState = 'PLAYING';
    });

    function updateScoreDisplay() {
      totalScoreEl.innerText = totalScore.toLocaleString();
    }

    function resetGame() {
      totalScore = 0;
      updateScoreDisplay();

      generateLevelData();

      player.x = 100;
      player.y = GROUND_Y - player.height;
      player.vx = 0;
      player.vy = 0;
      player.walkTimer = 0;
      cameraX = 0;
    }

    function update() {
      if (gameState !== 'PLAYING') return;

      if (keys.left) {
        player.vx = -player.speed;
        player.facing = 'left';
        player.walkTimer += 0.1;
      } else if (keys.right) {
        player.vx = player.speed;
        player.facing = 'right';
        player.walkTimer += 0.1;
      } else {
        player.vx = 0;
        player.walkTimer = 0;
      }

      player.vy += player.gravity;

      let nextX = player.x + player.vx;
      const feetY = player.y + player.height;

      platforms.forEach(p => {
        if (feetY > p.y + 12 && player.y < p.y + p.h) {
          if (player.x + player.width <= p.x && nextX + player.width > p.x) {
            nextX = p.x - player.width;
          } else if (player.x >= p.x + p.w && nextX < p.x + p.w) {
            nextX = p.x + p.w;
          }
        }
      });

      player.x = nextX;
      player.y += player.vy;

      let currentGround = GROUND_Y;
      player.isGrounded = false;

      const playerCenterX = player.x + player.width * 0.5;
      uValleys.forEach(uv => {
        if (playerCenterX >= uv.x && playerCenterX <= uv.x + uv.w) {
          const norm = (playerCenterX - uv.x) / uv.w;
          const valleyOffset = Math.sin(norm * Math.PI) * uv.depth;
          currentGround = GROUND_Y + valleyOffset;
        }
      });

      platforms.forEach(p => {
        if (player.x + player.width * 0.7 > p.x && player.x + player.width * 0.3 < p.x + p.w) {
          if (player.y + player.height >= p.y - 12 && player.y + player.height <= p.y + 20 && player.vy >= 0) {
            currentGround = Math.min(currentGround, p.y);
          }
        }
      });

      if (player.y + player.height >= currentGround) {
        player.y = currentGround - player.height;
        player.vy = 0;
        player.isGrounded = true;
      }

      if (player.x < 0) player.x = 0;

      if (player.x + player.width >= worldWidth - 400) {
        gameState = 'END';
        finalScore.innerHTML = `恭喜你完成了偶像歷程巡演！<br>最終總得分：<b>${totalScore.toLocaleString()}</b> 分！`;
        endScreen.classList.remove('hidden');
      }

      cameraX = player.x - CANVAS_WIDTH / 3;
      if (cameraX < 0) cameraX = 0;
      if (cameraX > worldWidth - CANVAS_WIDTH) cameraX = worldWidth - CANVAS_WIDTH;

      collectibles.forEach(c => {
        if (!c.collected) {
          const itemY = GROUND_Y - c.yOffset;
          if (player.x < c.x + SMALL_BASE_WIDTH &&
              player.x + player.width > c.x &&
              player.y < itemY + SMALL_BASE_WIDTH &&
              player.y + player.height > itemY) {
            c.collected = true;
            totalScore += 100000;
            updateScoreDisplay();
            playSound1();
          }
        }
      });

      eventNodes.forEach(e => {
        if (!e.collected) {
          const bigH = BIG_BASE_WIDTH * 1.2;
          const bigY = GROUND_Y - e.yOffset - bigH;
          
          if (player.x < e.x + BIG_BASE_WIDTH/2 &&
              player.x + player.width > e.x - BIG_BASE_WIDTH/2 &&
              player.y < bigY + bigH &&
              player.y + player.height > bigY) {
            
            e.collected = true;
            e.triggered = true;
            totalScore += 500000;
            updateScoreDisplay();
            playSound2();

            gameState = 'PAUSED';
            eventTitle.innerText = e.title;
            eventDesc.innerText = e.desc;
            eventScreen.classList.remove('hidden');
          }
        }
      });
    }

    function draw() {
      ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.save();
      ctx.translate(-cameraX, 0);

      // 1. 安全繪製地平線與凹字谷（絕不陷入無限死迴圈）
      ctx.strokeStyle = '#ff2a74';
      ctx.lineWidth = 4;
      ctx.beginPath();
      
      let stepX = 20;
      ctx.moveTo(0, GROUND_Y);
      for (let px = 0; px <= worldWidth; px += stepX) {
        let py = GROUND_Y;
        for (let uv of uValleys) {
          if (px >= uv.x && px <= uv.x + uv.w) {
            const norm = (px - uv.x) / uv.w;
            py = GROUND_Y + Math.sin(norm * Math.PI) * uv.depth;
            break;
          }
        }
        ctx.lineTo(px, py);
      }
      ctx.stroke();

      // 2. 畫淺藍色階梯與高台
      platforms.forEach(p => {
        ctx.fillStyle = 'rgba(135, 206, 250, 0.35)';
        ctx.fillRect(p.x, p.y, p.w, p.h);

        ctx.strokeStyle = '#87cefa';
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x, p.y, p.w, p.h);

        ctx.strokeStyle = '#e0f7fa';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x + p.w, p.y);
        ctx.stroke();
      });

      // 3. 畫 Big 展區
      eventNodes.forEach(e => {
        if (!e.collected) {
          if (imgBig.complete && imgBig.naturalWidth > 0) {
            const aspect = imgBig.naturalHeight / imgBig.naturalWidth;
            const drawW = BIG_BASE_WIDTH;
            const drawH = drawW * aspect;
            ctx.drawImage(imgBig, e.x - drawW/2, GROUND_Y - e.yOffset - drawH, drawW, drawH);
          } else {
            ctx.fillStyle = '#87cefa';
            ctx.fillRect(e.x - 30, GROUND_Y - e.yOffset - 90, 60, 90);
          }
        }
      });

      // 4. 畫 Small 筒筒
      collectibles.forEach(c => {
        if (!c.collected) {
          const itemY = GROUND_Y - c.yOffset;
          if (imgSmall.complete && imgSmall.naturalWidth > 0) {
            const aspect = imgSmall.naturalHeight / imgSmall.naturalWidth;
            const drawW = SMALL_BASE_WIDTH;
            const drawH = drawW * aspect;
            ctx.drawImage(imgSmall, c.x, itemY, drawW, drawH);
          } else {
            ctx.fillStyle = '#ff758c';
            ctx.beginPath();
            ctx.arc(c.x + 25, itemY + 25, 20, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      });

      // 5. 畫玩家
      const curImg = player.facing === 'left' ? imgRunLeft : imgRunRight;
      ctx.save();
      
      const centerX = player.x + player.width / 2;
      const centerY = player.y + player.height / 2;
      ctx.translate(centerX, centerY);

      if (player.vx !== 0 && player.isGrounded) {
        const angle = Math.sin(player.walkTimer) * 0.2;
        ctx.rotate(angle);
      }

      if (curImg.complete && curImg.naturalWidth > 0) {
        ctx.drawImage(curImg, -player.width / 2, -player.height / 2, player.width, player.height);
      } else {
        ctx.fillStyle = '#00f0ff';
        ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
      }
      ctx.restore();

      ctx.restore();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // 初始化關卡並啟動渲染
    generateLevelData();
    gameLoop();
  </script>
</body>
</html>
