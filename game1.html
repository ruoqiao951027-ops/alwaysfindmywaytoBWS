<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>偶像歷程回顧之旅</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0d0d1a;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 16:9 自適應遊戲容器 */
    #game-wrapper {
      position: relative;
      width: 100vw;
      height: 56.25vw;
      max-height: 100vh;
      max-width: 177.78vh;
      background: #1a1a2e;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* 直向提示：精確置中設定 */
    @media (orientation: portrait) {
      #game-wrapper::after {
        content: "📱 請將手機旋轉至橫向以獲得最佳體驗";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        font-size: 1.2rem;
        z-index: 100;
        padding: 20px;
        box-sizing: border-box;
      }
    }

    /* UI 彈窗層 */
    .screen-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      z-index: 10;
      text-align: center;
      padding: 20px;
    }

    .hidden {
      display: none !important;
    }

    h1 {
      font-size: 1.6rem;
      color: #ff2a74;
      margin-bottom: 8px;
    }

    p {
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 15px;
      max-width: 480px;
    }

    .btn {
      padding: 10px 25px;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, #ff2a74, #ff758c);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255, 42, 116, 0.4);
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* 控制按鈕容器：向上移動 (bottom: 65px) */
    .controls {
      position: absolute;
      bottom: 65px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 30px;
      padding-bottom: env(safe-area-inset-bottom);
      pointer-events: none;
      z-index: 5;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      align-items: center;
      pointer-events: auto;
    }

    /* Arrow 按鈕：調大至 95px */
    .arrow-btn {
      width: 95px;
      height: 95px;
      object-fit: contain;
      cursor: pointer;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));
    }

    #btn-left {
      transform: scaleX(-1);
    }

    #btn-left:active {
      transform: scaleX(-1) scale(0.9);
    }

    #btn-right:active, #btn-jump:active {
      transform: scale(0.9);
    }

    /* 跳躍按鈕 */
    .touch-btn {
      width: 55px;
      height: 55px;
      background: rgba(255, 255, 255, 0.25);
      border: 3px solid rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      backdrop-filter: blur(4px);
      pointer-events: auto;
      box-shadow: 0 4px 8px rgba(0,0,0,0.8);
    }

    #event-modal {
      background: rgba(20, 20, 35, 0.95);
      border: 2px solid #ff2a74;
      border-radius: 12px;
      width: 80%;
      max-width: 420px;
      padding: 20px;
    }

    #event-title {
      color: #ffd700;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <!-- 音樂資源 (預先載入) -->
  <audio id="game-bgm" src="game.mp3" loop preload="auto"></audio>

  <div id="game-wrapper">
    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <!-- UI 控制區 -->
    <div class="controls">
      <div class="btn-group">
        <img src="arrow.png" class="arrow-btn" id="btn-left" alt="向左">
        <img src="arrow.png" class="arrow-btn" id="btn-right" alt="向右">
      </div>
      <div class="btn-group">
        <div class="touch-btn" id="btn-jump">▲</div>
      </div>
    </div>

    <!-- 開始畫面 -->
    <div id="start-screen" class="screen-overlay">
      <h1>偶像星光歷程展</h1>
      <p>
        歡迎來到偶像的回顧之旅！<br>
        • 使用左下角箭頭移動<br>
        • 使用右下角 <b>▲</b> 跳躍收集筒筒<br>
        • 沿途觸發大事件重溫歷程！
      </p>
      <button class="btn" id="start-btn">開始旅程</button>
    </div>

    <!-- 事件彈窗 -->
    <div id="event-screen" class="screen-overlay hidden">
      <div id="event-modal">
        <h2 id="event-title">大事件標題</h2>
        <p id="event-desc">大事件詳細內容...</p>
        <button class="btn" id="close-event-btn">繼續前進</button>
      </div>
    </div>

    <!-- 結算畫面 -->
    <div id="end-screen" class="screen-overlay hidden">
      <h1>抵達終點！</h1>
      <p id="final-score">恭喜你完成了偶像歷程巡演！</p>
      <button class="btn" id="restart-btn">再次回顧</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 450;
    
    // 地平線維持剛好高度（65%）
    const GROUND_Y = Math.round(CANVAS_HEIGHT * 0.65);

    // 音樂播放器與極速解鎖機制
    const gameBgm = document.getElementById('game-bgm');
    gameBgm.volume = 0.5;
    let musicStarted = false;

    function initAudio() {
      if (!musicStarted) {
        gameBgm.play().then(() => {
          musicStarted = true;
        }).catch(e => console.log("等待首次使用者互動以播放音樂:", e));
      }
    }

    window.addEventListener('click', initAudio, { once: true });
    window.addEventListener('touchstart', initAudio, { once: true });

    // 載入圖片與狀態追蹤
    const images = {};
    function loadImage(key, src) {
      const img = new Image();
      img.src = src;
      img.onload = () => { images[key] = true; };
      img.onerror = () => { 
        console.warn(`圖片載入失敗: ${src}`); 
        images[key] = false;
      };
      return img;
    }

    const imgSmall = loadImage('small', 'small.png');
    const imgBig = loadImage('big', 'big.png');
    const imgRunRight = loadImage('runRight', 'runright.png');
    const imgRunLeft = loadImage('runLeft', 'runleft.png');

    // UI 元素
    const startScreen = document.getElementById('start-screen');
    const eventScreen = document.getElementById('event-screen');
    const endScreen = document.getElementById('end-screen');
    const eventTitle = document.getElementById('event-title');
    const eventDesc = document.getElementById('event-desc');
    const finalScore = document.getElementById('final-score');

    // 遊戲狀態
    let gameState = 'START';
    let score = 0;
    let cameraX = 0;
    const worldWidth = 3200;

    // 玩家設定：再放大至 110x138
    const player = {
      x: 100,
      y: 0,
      width: 110,
      height: 138,
      vx: 0,
      vy: 0,
      speed: 5.5,
      jumpPower: -13.0,
      gravity: 0.65,
      isGrounded: false,
      facing: 'right',
      walkTimer: 0
    };

    // Small (筒筒) 基準寬度 50px
    const SMALL_BASE_WIDTH = 50;
    let collectibles = [
      { x: 350, yOffset: 70, collected: false },
      { x: 600, yOffset: 120, collected: false },
      { x: 900, yOffset: 70, collected: false },
      { x: 1250, yOffset: 130, collected: false },
      { x: 1600, yOffset: 70, collected: false },
      { x: 1950, yOffset: 140, collected: false },
      { x: 2350, yOffset: 70, collected: false },
      { x: 2750, yOffset: 110, collected: false }
    ];

    // Big (大事件展區) 基準寬度 70px
    const BIG_BASE_WIDTH = 70;
    let eventNodes = [
      { x: 700, title: '初次出道展演', desc: '站上舞台的那一天，璀璨星光由此展開！', triggered: false },
      { x: 1400, title: '首張專輯發行', desc: '主打歌曲登上榜首，感謝一路相伴的粉絲們！', triggered: false },
      { x: 2100, title: '世界巡迴演唱會', desc: '萬人場館座無虛席，共同創造震撼的應援紫海！', triggered: false },
      { x: 2900, title: '榮獲年度最佳歌手', desc: '榮耀時刻，站在巔峰繼續攜手前行！', triggered: false }
    ];

    const keys = { left: false, right: false, jump: false };

    // 按鈕與鍵盤控制
    window.addEventListener('keydown', (e) => {
      initAudio();
      if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
      if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
      if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') && player.isGrounded && gameState === 'PLAYING') {
        player.vy = player.jumpPower;
        player.isGrounded = false;
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
      if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
    });

    const setupTouchBtn = (elementId, keyName) => {
      const el = document.getElementById(elementId);
      const start = (e) => { e.preventDefault(); initAudio(); keys[keyName] = true; };
      const end = (e) => { e.preventDefault(); keys[keyName] = false; };
      el.addEventListener('touchstart', start);
      el.addEventListener('touchend', end);
      el.addEventListener('mousedown', start);
      el.addEventListener('mouseup', end);
    };

    setupTouchBtn('btn-left', 'left');
    setupTouchBtn('btn-right', 'right');

    const jumpBtn = document.getElementById('btn-jump');
    const triggerJump = (e) => {
      if (e) e.preventDefault();
      initAudio();
      if (player.isGrounded && gameState === 'PLAYING') {
        player.vy = player.jumpPower;
        player.isGrounded = false;
      }
    };
    jumpBtn.addEventListener('touchstart', triggerJump);
    jumpBtn.addEventListener('mousedown', triggerJump);

    // UI 按鈕綁定
    document.getElementById('start-btn').addEventListener('click', () => {
      initAudio();
      startScreen.classList.add('hidden');
      resetGame();
      gameState = 'PLAYING';
    });

    document.getElementById('close-event-btn').addEventListener('click', () => {
      eventScreen.classList.add('hidden');
      gameState = 'PLAYING';
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
      resetGame();
      endScreen.classList.add('hidden');
      gameState = 'PLAYING';
    });

    function resetGame() {
      score = 0;
      player.x = 100;
      player.y = GROUND_Y - player.height;
      player.vx = 0;
      player.vy = 0;
      player.walkTimer = 0;
      cameraX = 0;
      collectibles.forEach(c => c.collected = false);
      eventNodes.forEach(e => e.triggered = false);
    }

    // 邏輯更新
    function update() {
      if (gameState !== 'PLAYING') return;

      if (keys.left) {
        player.vx = -player.speed;
        player.facing = 'left';
        player.walkTimer += 0.22; // 步伐節奏
      } else if (keys.right) {
        player.vx = player.speed;
        player.facing = 'right';
        player.walkTimer += 0.22; // 步伐節奏
      } else {
        player.vx = 0;
        player.walkTimer = 0;
      }

      player.vy += player.gravity;
      player.x += player.vx;
      player.y += player.vy;

      // 貼齊地平線
      if (player.y + player.height >= GROUND_Y) {
        player.y = GROUND_Y - player.height;
        player.vy = 0;
        player.isGrounded = true;
      }

      if (player.x < 0) player.x = 0;

      // 抵達終點
      if (player.x + player.width >= worldWidth - 100) {
        gameState = 'END';
        finalScore.innerText = `恭喜你完成了偶像歷程巡演！最終收集了 ${score} 個筒筒！`;
        endScreen.classList.remove('hidden');
      }

      // 鏡頭跟隨
      cameraX = player.x - CANVAS_WIDTH / 3;
      if (cameraX < 0) cameraX = 0;
      if (cameraX > worldWidth - CANVAS_WIDTH) cameraX = worldWidth - CANVAS_WIDTH;

      // 碰撞檢測：Small (筒筒)
      collectibles.forEach(c => {
        if (!c.collected) {
          const itemY = GROUND_Y - c.yOffset;
          if (player.x < c.x + SMALL_BASE_WIDTH &&
              player.x + player.width > c.x &&
              player.y < itemY + SMALL_BASE_WIDTH &&
              player.y + player.height > itemY) {
            c.collected = true;
            score += 1;
          }
        }
      });

      // 碰撞檢測：Big (大事件展區)
      eventNodes.forEach(e => {
        if (!e.triggered && Math.abs((player.x + player.width/2) - e.x) < 50) {
          e.triggered = true;
          gameState = 'PAUSED';
          eventTitle.innerText = e.title;
          eventDesc.innerText = e.desc;
          eventScreen.classList.remove('hidden');
        }
      });
    }

    // 畫面繪製
    function draw() {
      ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.save();
      ctx.translate(-cameraX, 0);

      // 1. 畫地平線
      ctx.strokeStyle = '#ff2a74';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y);
      ctx.lineTo(worldWidth, GROUND_Y);
      ctx.stroke();

      // 2. 畫 Big 展區
      eventNodes.forEach(e => {
        if (imgBig.complete && imgBig.naturalWidth > 0) {
          const aspect = imgBig.naturalHeight / imgBig.naturalWidth;
          const drawW = BIG_BASE_WIDTH;
          const drawH = drawW * aspect;
          ctx.drawImage(imgBig, e.x - drawW/2, GROUND_Y - drawH, drawW, drawH);
        } else {
          ctx.fillStyle = e.triggered ? '#555' : '#ffd700';
          ctx.fillRect(e.x - 20, GROUND_Y - 60, 40, 60);
        }
      });

      // 3. 畫 Small 筒筒
      collectibles.forEach(c => {
        if (!c.collected) {
          const itemY = GROUND_Y - c.yOffset;
          if (imgSmall.complete && imgSmall.naturalWidth > 0) {
            const aspect = imgSmall.naturalHeight / imgSmall.naturalWidth;
            const drawW = SMALL_BASE_WIDTH;
            const drawH = drawW * aspect;
            ctx.drawImage(imgSmall, c.x, itemY, drawW, drawH);
          } else {
            ctx.fillStyle = '#ff758c';
            ctx.beginPath();
            ctx.arc(c.x + 20, itemY + 20, 20, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      });

      // 4. 畫玩家（更大 + 晃動角度更大至約 20 度）
      const curImg = player.facing === 'left' ? imgRunLeft : imgRunRight;
      ctx.save();
      
      const centerX = player.x + player.width / 2;
      const centerY = player.y + player.height / 2;
      ctx.translate(centerX, centerY);

      // 擺動角度調大：約 ±20 度 (0.35 rad)
      if (player.vx !== 0 && player.isGrounded) {
        const angle = Math.sin(player.walkTimer) * 0.35;
        ctx.rotate(angle);
      }

      if (curImg.complete && curImg.naturalWidth > 0) {
        ctx.drawImage(curImg, -player.width / 2, -player.height / 2, player.width, player.height);
      } else {
        ctx.fillStyle = '#00f0ff';
        ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
      }
      ctx.restore();

      ctx.restore();

      // 5. 得分 UI（修復定位，顯示在左上角最顯眼位置）
      ctx.save();
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 20px Arial';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.shadowColor = '#000000';
      ctx.shadowBlur = 6;
      ctx.fillText(`收集筒筒數: ${score}`, 25, 20);
      ctx.restore();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
