<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>偶像歷程回顧之旅</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0d0d1a;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 16:9 自適應遊戲容器 */
    #game-wrapper {
      position: relative;
      width: 100vw;
      height: 56.25vw;
      max-height: 100vh;
      max-width: 177.78vh;
      background: #1a1a2e;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* 置頂計分 UI Badge（保證百分百看得到，不被 Canvas 裁切或遮擋） */
    #score-badge {
      position: absolute;
      top: 15px;
      left: 20px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.65);
      border: 2px solid #ff2a74;
      border-radius: 20px;
      padding: 6px 16px;
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      pointer-events: none;
      display: flex;
      gap: 15px;
      align-items: center;
    }

    #score-badge span {
      color: #ffd700;
    }

    /* 直向提示：精確置中設定 */
    @media (orientation: portrait) {
      #game-wrapper::after {
        content: "📱 請將手機旋轉至橫向以獲得最佳體驗";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        font-size: 1.2rem;
        z-index: 100;
        padding: 20px;
        box-sizing: border-box;
      }
    }

    /* UI 彈窗層 */
    .screen-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      z-index: 30;
      text-align: center;
      padding: 20px;
    }

    .hidden {
      display: none !important;
    }

    h1 {
      font-size: 1.6rem;
      color: #ff2a74;
      margin-bottom: 8px;
    }

    p {
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 15px;
      max-width: 480px;
    }

    .btn {
      padding: 10px 25px;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, #ff2a74, #ff758c);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255, 42, 116, 0.4);
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* 控制按鈕容器：下去一點 (bottom: 25px) */
    .controls {
      position: absolute;
      bottom: 25px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 30px;
      padding-bottom: env(safe-area-inset-bottom);
      pointer-events: none;
      z-index: 10;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      align-items: flex-end;
      pointer-events: auto;
    }

    /* Arrow 控制區外框與高透明度，上方加上箭頭符號圖案 */
    .arrow-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .arrow-label {
      font-size: 1.4rem;
      color: #ffffff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
      margin-bottom: 2px;
      font-weight: bold;
      pointer-events: none;
    }

    /* Arrow 按鈕：高透明度 (1.0 鮮明度 / 提高對比與透明不遮擋) */
    .arrow-btn {
      width: 85px;
      height: 85px;
      object-fit: contain;
      cursor: pointer;
      opacity: 0.95;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.85));
      transition: opacity 0.2s, transform 0.1s;
    }

    .arrow-btn:hover {
      opacity: 1;
    }

    #btn-left {
      transform: scaleX(-1);
    }

    #btn-left:active {
      transform: scaleX(-1) scale(0.9);
    }

    #btn-right:active, #btn-jump:active {
      transform: scale(0.9);
    }

    /* 跳躍按鈕：下去一點 (對齊底部) */
    .touch-btn {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.35);
      border: 3px solid rgba(255, 255, 255, 0.95);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 1.6rem;
      font-weight: bold;
      backdrop-filter: blur(4px);
      pointer-events: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.85);
      opacity: 0.95;
    }

    #event-modal {
      background: rgba(20, 20, 35, 0.95);
      border: 2px solid #ff2a74;
      border-radius: 12px;
      width: 80%;
      max-width: 420px;
      padding: 20px;
    }

    #event-title {
      color: #ffd700;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <!-- 音樂資源 (預先載入) -->
  <audio id="game-bgm" src="game.mp3" loop preload="auto"></audio>

  <div id="game-wrapper">
    <!-- 保證可見的獨立置頂計分板 -->
    <div id="score-badge">
      <div>筒筒: <span id="small-count">0</span>/100</div>
      <div>大事件: <span id="big-count">0</span>/10</div>
    </div>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <!-- UI 控制區 -->
    <div class="controls">
      <div class="btn-group">
        <div class="arrow-container">
          <div class="arrow-label">◄</div>
          <img src="arrow.png" class="arrow-btn" id="btn-left" alt="向左">
        </div>
        <div class="arrow-container">
          <div class="arrow-label">►</div>
          <img src="arrow.png" class="arrow-btn" id="btn-right" alt="向右">
        </div>
      </div>
      <div class="btn-group">
        <div class="touch-btn" id="btn-jump">▲</div>
      </div>
    </div>

    <!-- 開始畫面 -->
    <div id="start-screen" class="screen-overlay">
      <h1>偶像星光歷程展</h1>
      <p>
        歡迎來到偶像的回顧之旅！<br>
        • 使用左下角箭頭移動<br>
        • 使用右下角 <b>▲</b> 跳躍收集筒筒與大事件<br>
        • 觸發 10 個大事件與收集 100 個筒筒完成歷程！
      </p>
      <button class="btn" id="start-btn">開始旅程</button>
    </div>

    <!-- 事件彈窗 -->
    <div id="event-screen" class="screen-overlay hidden">
      <div id="event-modal">
        <h2 id="event-title">大事件標題</h2>
        <p id="event-desc">大事件詳細內容...</p>
        <button class="btn" id="close-event-btn">繼續前進</button>
      </div>
    </div>

    <!-- 結算畫面 -->
    <div id="end-screen" class="screen-overlay hidden">
      <h1>抵達終點！</h1>
      <p id="final-score">恭喜你完成了偶像歷程巡演！</p>
      <button class="btn" id="restart-btn">再次回顧</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const CANVAS_WIDTH = 800;
    const CANVAS_HEIGHT = 450;
    
    // 地平線維持 65% 高度
    const GROUND_Y = Math.round(CANVAS_HEIGHT * 0.65);

    // 音樂播放器
    const gameBgm = document.getElementById('game-bgm');
    gameBgm.volume = 0.5;
    let musicStarted = false;

    function initAudio() {
      if (!musicStarted) {
        gameBgm.play().then(() => {
          musicStarted = true;
        }).catch(e => console.log("等待互動播放音樂:", e));
      }
    }

    window.addEventListener('click', initAudio, { once: true });
    window.addEventListener('touchstart', initAudio, { once: true });

    // 載入圖片
    const images = {};
    function loadImage(key, src) {
      const img = new Image();
      img.src = src;
      img.onload = () => { images[key] = true; };
      img.onerror = () => { images[key] = false; };
      return img;
    }

    const imgSmall = loadImage('small', 'small.png');
    const imgBig = loadImage('big', 'big.png');
    const imgRunRight = loadImage('runRight', 'runright.png');
    const imgRunLeft = loadImage('runLeft', 'runleft.png');

    // UI DOM
    const startScreen = document.getElementById('start-screen');
    const eventScreen = document.getElementById('event-screen');
    const endScreen = document.getElementById('end-screen');
    const eventTitle = document.getElementById('event-title');
    const eventDesc = document.getElementById('event-desc');
    const finalScore = document.getElementById('final-score');
    const smallCountEl = document.getElementById('small-count');
    const bigCountEl = document.getElementById('big-count');

    // 遊戲狀態與關卡寬度
    let gameState = 'START';
    let smallCollectedCount = 0;
    let bigCollectedCount = 0;
    let cameraX = 0;
    
    // 總關卡寬度設為 12800px 讓 100 個 Small 與 10 個 Big 有非常充裕豐富的間距
    const worldWidth = 12800;

    // 玩家設定
    const player = {
      x: 100,
      y: 0,
      width: 110,
      height: 138,
      vx: 0,
      vy: 0,
      speed: 6.0,
      jumpPower: -14.0,
      gravity: 0.65,
      isGrounded: false,
      facing: 'right',
      walkTimer: 0
    };

    // 尺寸設定
    const SMALL_BASE_WIDTH = 50;
    const BIG_BASE_WIDTH = 95; // Big 大一點

    // 生成 100 個 Small 和 10 個 Big
    // 結構：開頭 5 個 Small -> [Big 1] -> 10 個 Small -> [Big 2] -> ... -> [Big 10] -> 結尾 5 個 Small
    const eventTitles = [
      '初次出道展演', '首張單曲爆紅', '舉辦首次見面會', '首張專輯發行', '綜藝節目大獲好評',
      '跨國音樂節嘉賓', '世界巡迴演唱會', '榮獲年度最佳歌手', '達成百萬銷量紀錄', '十週年紀念演唱會'
    ];
    const eventDescs = [
      '站上舞台的那一天，璀璨星光由此展開！',
      '旋律傳遍街頭巷尾，登上流行榜單第一名！',
      '與現場粉絲溫馨互動，收穫無數感動與淚水！',
      '展現多樣音樂風格，獲評論家與歌迷一致盛讚！',
      '憑藉獨特魅力與幽默感圈粉無數，引爆討論熱潮！',
      '代表登上國際舞台，向世界展示獨一無二的震撼演出！',
      '萬人場館座無虛席，共同創造震撼的應援紫海！',
      '榮耀時刻，站在巔峰繼續攜手前行！',
      '突破歷史性的銷量裏程碑，成為殿堂級傳奇！',
      '感謝一路相伴，未來的星光之路依然一同耀眼綻放！'
    ];

    let collectibles = [];
    let eventNodes = [];

    function generateLevelData() {
      collectibles = [];
      eventNodes = [];

      let currentX = 400;
      const stepX = 110;

      // 1. 開頭 5 個 small（高低多變）
      const startHeights = [70, 120, 160, 110, 70];
      for (let i = 0; i < 5; i++) {
        collectibles.push({
          x: currentX,
          yOffset: startHeights[i % startHeights.length],
          collected: false
        });
        currentX += stepX;
      }

      // 2. 生成 10 個 Big，每兩個 Big 之間放 10 個 Small
      for (let b = 0; b < 10; b++) {
        currentX += 180;
        
        // Big 的高度變化（大部分地面，部分低空懸浮）
        const bigYOffset = (b % 3 === 1) ? 90 : 0; 

        eventNodes.push({
          x: currentX,
          yOffset: bigYOffset,
          title: eventTitles[b],
          desc: eventDescs[b],
          triggered: false,
          collected: false // 觸發後消失
        });

        currentX += 280;

        // 如果不是最後一個 Big，後方放 10 個 Small
        if (b < 9) {
          for (let s = 0; s < 10; s++) {
            // 生成豐富的高低波動（正弦波 + 梯形跳躍高低）
            let yOff = 70;
            const pattern = (s + b) % 5;
            if (pattern === 1) yOff = 120;
            if (pattern === 2) yOff = 175;
            if (pattern === 3) yOff = 130;
            if (pattern === 4) yOff = 80;

            collectibles.push({
              x: currentX,
              yOffset: yOff,
              collected: false
            });
            currentX += stepX;
          }
        }
      }

      // 3. 結尾 5 個 small
      currentX += 100;
      const endHeights = [80, 130, 170, 120, 70];
      for (let i = 0; i < 5; i++) {
        collectibles.push({
          x: currentX,
          yOffset: endHeights[i % endHeights.length],
          collected: false
        });
        currentX += stepX;
      }
    }

    const keys = { left: false, right: false, jump: false };

    // 按鈕與鍵盤控制
    window.addEventListener('keydown', (e) => {
      initAudio();
      if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
      if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
      if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') && player.isGrounded && gameState === 'PLAYING') {
        player.vy = player.jumpPower;
        player.isGrounded = false;
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
      if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
    });

    const setupTouchBtn = (elementId, keyName) => {
      const el = document.getElementById(elementId);
      const start = (e) => { e.preventDefault(); initAudio(); keys[keyName] = true; };
      const end = (e) => { e.preventDefault(); keys[keyName] = false; };
      el.addEventListener('touchstart', start);
      el.addEventListener('touchend', end);
      el.addEventListener('mousedown', start);
      el.addEventListener('mouseup', end);
    };

    setupTouchBtn('btn-left', 'left');
    setupTouchBtn('btn-right', 'right');

    const jumpBtn = document.getElementById('btn-jump');
    const triggerJump = (e) => {
      if (e) e.preventDefault();
      initAudio();
      if (player.isGrounded && gameState === 'PLAYING') {
        player.vy = player.jumpPower;
        player.isGrounded = false;
      }
    };
    jumpBtn.addEventListener('touchstart', triggerJump);
    jumpBtn.addEventListener('mousedown', triggerJump);

    // UI 按鈕綁定
    document.getElementById('start-btn').addEventListener('click', () => {
      initAudio();
      startScreen.classList.add('hidden');
      resetGame();
      gameState = 'PLAYING';
    });

    document.getElementById('close-event-btn').addEventListener('click', () => {
      eventScreen.classList.add('hidden');
      gameState = 'PLAYING';
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
      resetGame();
      endScreen.classList.add('hidden');
      gameState = 'PLAYING';
    });

    function updateScoreDisplay() {
      smallCountEl.innerText = smallCollectedCount;
      bigCountEl.innerText = bigCollectedCount;
    }

    function resetGame() {
      smallCollectedCount = 0;
      bigCollectedCount = 0;
      updateScoreDisplay();

      player.x = 100;
      player.y = GROUND_Y - player.height;
      player.vx = 0;
      player.vy = 0;
      player.walkTimer = 0;
      cameraX = 0;

      generateLevelData();
    }

    // 邏輯更新
    function update() {
      if (gameState !== 'PLAYING') return;

      if (keys.left) {
        player.vx = -player.speed;
        player.facing = 'left';
        player.walkTimer += 0.22;
      } else if (keys.right) {
        player.vx = player.speed;
        player.facing = 'right';
        player.walkTimer += 0.22;
      } else {
        player.vx = 0;
        player.walkTimer = 0;
      }

      player.vy += player.gravity;
      player.x += player.vx;
      player.y += player.vy;

      // 貼齊地平線
      if (player.y + player.height >= GROUND_Y) {
        player.y = GROUND_Y - player.height;
        player.vy = 0;
        player.isGrounded = true;
      }

      if (player.x < 0) player.x = 0;

      // 抵達終點
      if (player.x + player.width >= worldWidth - 200) {
        gameState = 'END';
        finalScore.innerHTML = `恭喜你完成了偶像歷程巡演！<br>最終收集了 <b>${smallCollectedCount}</b> 個筒筒 與 <b>${bigCollectedCount}</b> 個大事件！`;
        endScreen.classList.remove('hidden');
      }

      // 鏡頭跟隨
      cameraX = player.x - CANVAS_WIDTH / 3;
      if (cameraX < 0) cameraX = 0;
      if (cameraX > worldWidth - CANVAS_WIDTH) cameraX = worldWidth - CANVAS_WIDTH;

      // 碰撞檢測：Small (筒筒)
      collectibles.forEach(c => {
        if (!c.collected) {
          const itemY = GROUND_Y - c.yOffset;
          if (player.x < c.x + SMALL_BASE_WIDTH &&
              player.x + player.width > c.x &&
              player.y < itemY + SMALL_BASE_WIDTH &&
              player.y + player.height > itemY) {
            c.collected = true;
            smallCollectedCount += 1;
            updateScoreDisplay();
          }
        }
      });

      // 碰撞檢測：Big (大事件展區) - 碰到後會跳彈窗且【消失】
      eventNodes.forEach(e => {
        if (!e.collected) {
          const bigH = BIG_BASE_WIDTH * 1.2;
          const bigY = GROUND_Y - e.yOffset - bigH;
          
          if (player.x < e.x + BIG_BASE_WIDTH/2 &&
              player.x + player.width > e.x - BIG_BASE_WIDTH/2 &&
              player.y < bigY + bigH &&
              player.y + player.height > bigY) {
            
            e.collected = true; // 設置為已收集（消失）
            e.triggered = true;
            bigCollectedCount += 1;
            updateScoreDisplay();

            gameState = 'PAUSED';
            eventTitle.innerText = e.title;
            eventDesc.innerText = e.desc;
            eventScreen.classList.remove('hidden');
          }
        }
      });
    }

    // 畫面繪製
    function draw() {
      ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

      ctx.save();
      ctx.translate(-cameraX, 0);

      // 1. 畫地平線
      ctx.strokeStyle = '#ff2a74';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y);
      ctx.lineTo(worldWidth, GROUND_Y);
      ctx.stroke();

      // 2. 畫 Big 展區（未被收集時繪製，大一點 BIG_BASE_WIDTH = 95）
      eventNodes.forEach(e => {
        if (!e.collected) {
          if (imgBig.complete && imgBig.naturalWidth > 0) {
            const aspect = imgBig.naturalHeight / imgBig.naturalWidth;
            const drawW = BIG_BASE_WIDTH;
            const drawH = drawW * aspect;
            ctx.drawImage(imgBig, e.x - drawW/2, GROUND_Y - e.yOffset - drawH, drawW, drawH);
          } else {
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(e.x - 30, GROUND_Y - e.yOffset - 90, 60, 90);
          }
        }
      });

      // 3. 畫 Small 筒筒（未被收集時繪製）
      collectibles.forEach(c => {
        if (!c.collected) {
          const itemY = GROUND_Y - c.yOffset;
          if (imgSmall.complete && imgSmall.naturalWidth > 0) {
            const aspect = imgSmall.naturalHeight / imgSmall.naturalWidth;
            const drawW = SMALL_BASE_WIDTH;
            const drawH = drawW * aspect;
            ctx.drawImage(imgSmall, c.x, itemY, drawW, drawH);
          } else {
            ctx.fillStyle = '#ff758c';
            ctx.beginPath();
            ctx.arc(c.x + 25, itemY + 25, 20, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      });

      // 4. 畫玩家（大尺寸 + 擺動角度約 20 度）
      const curImg = player.facing === 'left' ? imgRunLeft : imgRunRight;
      ctx.save();
      
      const centerX = player.x + player.width / 2;
      const centerY = player.y + player.height / 2;
      ctx.translate(centerX, centerY);

      if (player.vx !== 0 && player.isGrounded) {
        const angle = Math.sin(player.walkTimer) * 0.35;
        ctx.rotate(angle);
      }

      if (curImg.complete && curImg.naturalWidth > 0) {
        ctx.drawImage(curImg, -player.width / 2, -player.height / 2, player.width, player.height);
      } else {
        ctx.fillStyle = '#00f0ff';
        ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
      }
      ctx.restore();

      ctx.restore();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
