<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>筒筒's Library</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      /* 背景圖片設定 */
      background-image: url('bgmain.png'); 
      background-size: cover;          
      background-position: center;     
      background-repeat: no-repeat;   
      
      font-family: Arial, sans-serif;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* 1. Splash Screen 待機畫面 */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 20, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      cursor: pointer;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .splash-title {
      font-size: 2.2rem;
      color: #ff2a74;
      margin-bottom: 20px;
      text-shadow: 0 0 15px rgba(255, 42, 116, 0.8);
      font-weight: bold;
    }

    .splash-prompt {
      font-size: 1.2rem;
      color: #ffffff;
      padding: 12px 24px;
      border: 2px solid #ff758c;
      border-radius: 30px;
      background: rgba(255, 42, 116, 0.2);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 42, 116, 0.7);
      }
      70% {
        transform: scale(1.05);
        box-shadow: 0 0 0 15px rgba(255, 42, 116, 0);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 42, 116, 0);
      }
    }

    /* 2. 介紹文字畫面 */
    #intro-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 20, 0.6); /* 稍微看得到背景 */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 8;
      cursor: pointer;
      padding: 20px;
      text-align: center;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .intro-text {
      font-size: 1.3rem;
      line-height: 1.8;
      color: #fff;
      max-width: 500px;
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      
      /* 初始狀態：隱藏並位在下方 */
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    /* 文字滑入顯示的效果 */
    .intro-text.slide-up {
      opacity: 1;
      transform: translateY(0);
    }

    /* 點擊繼續提示 */
    .click-hint {
      margin-top: 30px;
      font-size: 0.95rem;
      color: #ff758c;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .click-hint.show {
      opacity: 1;
      animation: pulse 2s infinite;
    }

    /* 3. 主選單 (三個按鈕) */
    .main-menu {
      position: relative;
      z-index: 5;
      text-align: center;
      background: rgba(20, 20, 35, 0.85);
      padding: 40px 30px;
      border-radius: 20px;
      border: 2px solid #ff2a74;
      box-shadow: 0 0 20px rgba(255, 42, 116, 0.5);
      max-width: 400px;
      width: 90%;

      /* 初始狀態：隱藏並縮小 */
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none; /* 尚未出現時不擋住點擊 */
    }

    /* 按鈕浮出後的狀態 */
    .main-menu.pop-up {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    h1 {
      font-size: 2rem;
      color: #ff2a74;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(255, 42, 116, 0.8);
    }

    .btn-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .menu-btn {
      padding: 15px 25px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, #ff2a74, #ff758c);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 42, 116, 0.4);
      display: inline-block;
    }

    .menu-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(255, 42, 116, 0.6);
    }

    .menu-btn.disabled {
      background: #555;
      color: #aaa;
      cursor: not-allowed;
      box-shadow: none;
    }

    .menu-btn.disabled:hover {
      transform: none;
    }

    /* 通用隱藏樣式 */
    .fade-out {
      opacity: 0 !important;
      visibility: hidden !important;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- 1. Splash Screen 待機畫面 -->
  <div id="splash-screen">
    <div class="splash-title">筒筒's Library</div>
    <div class="splash-prompt">✨ 點擊任意處進入畫面 ✨</div>
  </div>

  <!-- 2. 兩段介紹文字畫面 -->
  <div id="intro-screen" class="hidden">
    <!-- 第一段介紹文字 (內容可自由替換) -->
    <div id="intro-1" class="intro-text">
      歡迎來到筒筒的應援庫！<br>
      這裡記錄了關於佑錫的每一個璀璨瞬間。
    </div>
    
    <!-- 第二段介紹文字 (內容可自由替換) -->
    <div id="intro-2" class="intro-text">
      準備好重溫這些珍貴的歷程了嗎？<br>
      請點擊畫面開啟選單。
    </div>

    <div id="click-hint" class="click-hint">✨ 點擊任意處繼續 ✨</div>
  </div>

  <!-- 主畫面背景音樂 -->
  <audio id="main-bgm" src="bgm_main.mp3" loop></audio>

  <!-- 3. 主選單 (三個按鈕) -->
  <div id="main-menu" class="main-menu">
    <h1>筒筒's Library</h1>
    <div class="btn-container">
      <a href="game1.html" class="menu-btn"> 佑錫回顧小遊戲 </a>
      <button class="menu-btn disabled" disabled> 生咖地址&應援小禮 </button>
      <button class="menu-btn disabled" disabled> 生咖會場瞧一眼 </button>
    </div>
  </div>

  <script>
    const splashScreen = document.getElementById('splash-screen');
    const introScreen = document.getElementById('intro-screen');
    const intro1 = document.getElementById('intro-1');
    const intro2 = document.getElementById('intro-2');
    const clickHint = document.getElementById('click-hint');
    const mainMenu = document.getElementById('main-menu');
    const mainBgm = document.getElementById('main-bgm');

    mainBgm.volume = 0.5;

    // 階段 1：點擊 Splash Screen
    function handleSplashClick() {
      // 1. 播放音樂
      mainBgm.play().catch(err => console.log("音樂播放受阻：", err));

      // 2. 隱藏 Splash Screen
      splashScreen.classList.add('fade-out');

      // 3. 顯示介紹文字區域
      introScreen.classList.remove('hidden');

      // 4. 第一段文字滑入
      setTimeout(() => {
        intro1.classList.add('slide-up');
      }, 300);

      // 5. 間隔 2 秒後，第二段文字滑入
      setTimeout(() => {
        intro2.classList.add('slide-up');
        clickHint.classList.add('show');

        // 第二段文字出現後，才開啟 introScreen 的點擊監聽
        introScreen.addEventListener('click', handleIntroClick);
        introScreen.addEventListener('touchstart', handleIntroClick);
      }, 2300); // 300ms 緩衝 + 2000ms 間隔

      // 移除 Splash Screen 事件
      splashScreen.removeEventListener('click', handleSplashClick);
      splashScreen.removeEventListener('touchstart', handleSplashClick);
    }

    // 階段 2：點擊介紹文字畫面
    function handleIntroClick() {
      // 1. 介紹文字畫面淡出
      introScreen.classList.add('fade-out');

      // 2. 主選單按鈕彈出
      setTimeout(() => {
        mainMenu.classList.add('pop-up');
      }, 300);

      // 移除事件監聽
      introScreen.removeEventListener('click', handleIntroClick);
      introScreen.removeEventListener('touchstart', handleIntroClick);
    }

    // 綁定最初的點擊事件
    splashScreen.addEventListener('click', handleSplashClick);
    splashScreen.addEventListener('touchstart', handleSplashClick);
  </script>

</body>
</html>
