<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>筒筒's Library</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      /* 背景圖片設定 */
      background-image: url('bgmain.png'); 
      background-size: cover;          
      background-position: center;     
      background-repeat: no-repeat;   
      
      font-family: Arial, sans-serif;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* 1. Splash Screen 待機畫面 (移除黑色遮罩，改為透明) */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent; /* 完全透出背景圖片 */
      display: flex;
      flex-direction: column;
      justify-content: flex-end; /* 將進度條放至畫面下方 */
      align-items: center;
      padding-bottom: 80px;      /* 距離底部高度 */
      z-index: 10;
      cursor: pointer;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    /* 載入進度條容器外框 */
    .progress-container {
      width: 70%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

   /* 進度條軌道：調粗至 20px，並置於中央偏下 (top: 65%) */
.progress-track {
  position: absolute;
  top: 65%; /* 中央偏下位置 */
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80%;
  max-width: 360px;
  height: 20px; /* 進度條大幅加粗 */
  background: rgba(255, 255, 255, 0.3);
  border-radius: 10px;
  overflow: visible; /* 讓放大後的手指可以凸出 */
  backdrop-filter: blur(2px);
}

/* 進度條本體 */
.progress-bar {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff758c, #ff2a74);
  border-radius: 10px;
  transition: width 0.1s linear;
}

/* 手指圖示：大幅放大至 64px，並加入擺動動畫 */
.finger-icon {
  position: absolute;
  right: -25px; /* 根據放大後尺寸微調前端對齊 */
  top: 50%;
  width: 64px;  /* 手指大幅放大 */
  height: 64px;
  object-fit: contain;
  pointer-events: none;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
  
  /* 綁定每 0.7 秒左右無限循環的擺動動畫 */
  animation: fingerWiggle 0.7s infinite alternate ease-in-out;
}

/* 2. 新增手指左右/角度擺動的動畫 Keyframes */
@keyframes fingerWiggle {
  0% {
    transform: translateY(-50%) rotate(-15deg);
  }
  100% {
    transform: translateY(-50%) rotate(20deg);
  }
}

    /* 2. 介紹文字畫面 */
    #intro-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 20, 0.6); /* 稍微看得到背景 */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 8;
      cursor: pointer;
      padding: 20px;
      text-align: center;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .intro-text {
      font-size: 1.3rem;
      line-height: 1.8;
      color: #fff;
      max-width: 500px;
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      
      /* 初始狀態：隱藏並位在下方 */
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    /* 文字滑入顯示的效果 */
    .intro-text.slide-up {
      opacity: 1;
      transform: translateY(0);
    }

    /* 點擊繼續提示 */
    .click-hint {
      margin-top: 30px;
      font-size: 0.95rem;
      color: #ff758c;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .click-hint.show {
      opacity: 1;
    }

    /* 3. 主選單 (三個按鈕) */
    .main-menu {
      position: relative;
      z-index: 5;
      text-align: center;
      background: rgba(20, 20, 35, 0.85);
      padding: 40px 30px;
      border-radius: 20px;
      border: 2px solid #ff2a74;
      box-shadow: 0 0 20px rgba(255, 42, 116, 0.5);
      max-width: 400px;
      width: 90%;

      /* 初始狀態：隱藏並縮小 */
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none; /* 尚未出現時不擋住點擊 */
    }

    /* 按鈕浮出後的狀態 */
    .main-menu.pop-up {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    h1 {
      font-size: 2rem;
      color: #ff2a74;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(255, 42, 116, 0.8);
    }

    .btn-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .menu-btn {
      padding: 15px 25px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, #ff2a74, #ff758c);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 42, 116, 0.4);
      display: inline-block;
    }

    .menu-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(255, 42, 116, 0.6);
    }

    .menu-btn.disabled {
      background: #555;
      color: #aaa;
      cursor: not-allowed;
      box-shadow: none;
    }

    .menu-btn.disabled:hover {
      transform: none;
    }

    /* 通用隱藏樣式 */
    .fade-out {
      opacity: 0 !important;
      visibility: hidden !important;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- 1. Splash Screen 待機畫面 (進度條與手指) -->
<div id="splash-screen">
  <div class="progress-track">
    <div id="progress-bar" class="progress-bar">
      <img src="finger.png" alt="finger" class="finger-icon">
    </div>
  </div>
</div>

  <!-- 2. 兩段介紹文字畫面 -->
  <div id="intro-screen" class="hidden">
    <!-- 第一段介紹文字 -->
    <div id="intro-1" class="intro-text">
      因為佑錫<br>
      這個夏天筒筒們都很狂熱<br>
      有沒有參加見面會呢?<br>
      是怎樣的情景呢?<br>
      相信筒筒們會有聊不完的話題<br>
    </div>
    
    <!-- 第二段介紹文字 -->
    <div id="intro-2" class="intro-text">
      今年再次舉辦了邊邊生咖<br>
      歡迎筒筒們前來<br>
      不管是新入坑還是愛了邊邊兩年的筒筒<br>
      讓我們同聚<br>
      為最帥的圖書館員慶祝生日吧<br>
      準備好一起重溫這些珍貴的歷程!<br>
    </div>

    <div id="click-hint" class="click-hint">✨ 點擊任意處繼續 ✨</div>
  </div>

  <!-- 主畫面背景音樂 -->
  <audio id="main-bgm" src="main.mp3" loop></audio>

  <!-- 3. 主選單 (三個按鈕) -->
  <div id="main-menu" class="main-menu">
    <h1>筒筒's Library</h1>
    <div class="btn-container">
      <a href="game1.html" class="menu-btn"> 佑錫回顧小遊戲 </a>
      <button class="menu-btn disabled" disabled> 生咖地址&應援小禮 </button>
      <button class="menu-btn disabled" disabled> 生咖會場瞧一眼 </button>
    </div>
  </div>

  <script>
    const splashScreen = document.getElementById('splash-screen');
    const progressBar = document.getElementById('progress-bar');
    const introScreen = document.getElementById('intro-screen');
    const intro1 = document.getElementById('intro-1');
    const intro2 = document.getElementById('intro-2');
    const clickHint = document.getElementById('click-hint');
    const mainMenu = document.getElementById('main-menu');
    const mainBgm = document.getElementById('main-bgm');

    mainBgm.volume = 0.5;

    // 模擬資源載入進度條跑動
    let progress = 0;
    const loadingInterval = setInterval(() => {
      // 隨機增加進度，呈現自然載入感
      progress += Math.floor(Math.random() * 12) + 5;
      
      if (progress >= 100) {
        progress = 100;
        clearInterval(loadingInterval);
        
        // 載入完畢，開啟點擊進入的監聽
        splashScreen.addEventListener('click', handleSplashClick);
        splashScreen.addEventListener('touchstart', handleSplashClick);
      }
      
      progressBar.style.width = progress + '%';
    }, 120);

    // 階段 1：進度條跑完後點擊 Splash Screen
    function handleSplashClick() {
      // 1. 播放音樂
      mainBgm.play().catch(err => console.log("音樂播放受阻：", err));

      // 2. 隱藏 Splash Screen
      splashScreen.classList.add('fade-out');

      // 3. 顯示介紹文字區域
      introScreen.classList.remove('hidden');

      // 4. 第一段文字滑入
      setTimeout(() => {
        intro1.classList.add('slide-up');
      }, 300);

      // 5. 間隔 2 秒後，第二段文字滑入
      setTimeout(() => {
        intro2.classList.add('slide-up');
        clickHint.classList.add('show');

        // 第二段文字出現後，開啟 introScreen 點擊監聽
        introScreen.addEventListener('click', handleIntroClick);
        introScreen.addEventListener('touchstart', handleIntroClick);
      }, 2300);

      // 移除 Splash Screen 事件
      splashScreen.removeEventListener('click', handleSplashClick);
      splashScreen.removeEventListener('touchstart', handleSplashClick);
    }

    // 階段 2：點擊介紹文字畫面
    function handleIntroClick() {
      // 1. 介紹文字畫面淡出
      introScreen.classList.add('fade-out');

      // 2. 主選單按鈕彈出
      setTimeout(() => {
        mainMenu.classList.add('pop-up');
      }, 300);

      // 移除事件監聽
      introScreen.removeEventListener('click', handleIntroClick);
      introScreen.removeEventListener('touchstart', handleIntroClick);
    }
  </script>

</body>
</html>
