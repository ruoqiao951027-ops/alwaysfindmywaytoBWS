<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>筒筒's Library</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

   body {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  /* 設定背景圖片 */
  background-image: url('bgmain.png'); 
  background-size: cover;          /* 讓圖片鋪滿螢幕 */
  background-position: center;      /* 置中顯示 */
  background-repeat: no-repeat;    /* 不重複 */
  
  font-family: Arial, sans-serif;
  color: #fff;
}



    .main-menu {
      position: relative;
      z-index: 2;
      text-align: center;
      background: rgba(20, 20, 35, 0.85);
      padding: 40px 30px;
      border-radius: 20px;
      border: 2px solid #ff2a74;
      box-shadow: 0 0 20px rgba(255, 42, 116, 0.5);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      font-size: 2rem;
      color: #ff2a74;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(255, 42, 116, 0.8);
    }

    .btn-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .menu-btn {
      padding: 15px 25px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, #ff2a74, #ff758c);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none; /* 移除超連結下劃線 */
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 42, 116, 0.4);
    }

    .menu-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(255, 42, 116, 0.6);
    }

    /* 尚未開放的按鈕樣式 */
    .menu-btn.disabled {
      background: #555;
      color: #aaa;
      cursor: not-allowed;
      box-shadow: none;
    }

    .menu-btn.disabled:hover {
      transform: none;
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <div class="main-menu">
    <h1>筒筒's Library</h1>
    <div class="btn-container">
      <!-- 按鈕 1：連結到小遊戲頁面 -->
      <a href="game1.html" class="menu-btn"> 佑錫回顧小遊戲 </a>
      
      <!-- 按鈕 2：預留 (暫不連線) -->
      <button class="menu-btn disabled" disabled> 生咖地址&應援小禮 </button>
      
      <!-- 按鈕 3：預留 (暫不連線) -->
      <button class="menu-btn disabled" disabled> 生咖會場瞧一眼 </button>
    </div>
  </div>

</body>
</html>
