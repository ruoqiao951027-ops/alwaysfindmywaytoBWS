<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>偶像主題大廳</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      /* 背景圖片設定 (請換成你的圖片檔名) */
      background-image: url('bg.jpg'); 
      background-size: cover;
      background-position: center;
      background-repeat: no-no-repeat;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    /* 遮罩，讓背景圖稍微變暗，突顯文字與按鈕 */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    .main-menu {
      position: relative;
      z-index: 2;
      text-align: center;
      background: rgba(20, 20, 35, 0.85);
      padding: 40px 30px;
      border-radius: 20px;
      border: 2px solid #ff2a74;
      box-shadow: 0 0 20px rgba(255, 42, 116, 0.5);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      font-size: 2rem;
      color: #ff2a74;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(255, 42, 116, 0.8);
    }

    .btn-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .menu-btn {
      padding: 15px 25px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, #ff2a74, #ff758c);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none; /* 移除超連結下劃線 */
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 42, 116, 0.4);
    }

    .menu-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(255, 42, 116, 0.6);
    }

    /* 尚未開放的按鈕樣式 */
    .menu-btn.disabled {
      background: #555;
      color: #aaa;
      cursor: not-allowed;
      box-shadow: none;
    }

    .menu-btn.disabled:hover {
      transform: none;
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <div class="main-menu">
    <h1>偶像主題大廳</h1>
    <div class="btn-container">
      <!-- 按鈕 1：連結到小遊戲頁面 -->
      <a href="game1.html" class="menu-btn">🎮 歷程回顧小遊戲</a>
      
      <!-- 按鈕 2：預留 (暫不連線) -->
      <button class="menu-btn disabled" disabled>🔒 敬請期待 (遊戲二)</button>
      
      <!-- 按鈕 3：預留 (暫不連線) -->
      <button class="menu-btn disabled" disabled>🔒 敬請期待 (遊戲三)</button>
    </div>
  </div>

</body>
</html>
